# SOC-Lab: Docker-based Security Learning & SOC Training Environment
# Phase 1: IDS / Fail2ban / Auditd / SIEM

services:
  # ============================================
  # Attack Zone - Kali Linux
  # ============================================
  kali:
    build:
      context: ./attack
      dockerfile: Dockerfile
    container_name: soc-lab-kali
    hostname: kali
    tty: true
    stdin_open: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      app_net:
        ipv4_address: 172.23.0.30
    volumes:
      - ./attack/scripts:/scripts:ro
      - ./attack/wordlists:/wordlists:ro
      - attack_results:/results
    environment:
      - TARGET=app
      - TARGET_IP=172.23.0.20
      - TARGET_PORT=3000
    command: /bin/bash
    depends_on:
      app:
        condition: service_healthy

  # ============================================
  # Target namespace - Suricata IDS + training API + Fail2ban
  # ============================================
  # This minimal owner keeps the namespace stable when the application or IDS
  # image is rebuilt independently. Without it, long-running Fail2ban can stay
  # attached to the deleted namespace of an old Suricata container.
  target-netns:
    image: alpine:3.22
    container_name: soc-lab-target-netns
    hostname: target
    networks:
      app_net:
        ipv4_address: 172.23.0.20
        aliases:
          - app
          - target-app
    ports:
      - "127.0.0.1:3000:3000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command: ["tail", "-f", "/dev/null"]
    restart: unless-stopped

  suricata:
    build:
      context: ./suricata
      dockerfile: Dockerfile
    container_name: soc-lab-suricata
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    network_mode: "service:target-netns"
    volumes:
      - suricata_logs:/var/log/suricata
    command: -c /opt/soc-lab/suricata.yaml -i eth0
    depends_on:
      target-netns:
        condition: service_started

  # Rotated EVE files are retained for seven days, matching the Elasticsearch
  # learning-data retention window. Active files are never deleted.
  suricata-log-pruner:
    image: alpine:3.22
    container_name: soc-lab-suricata-log-pruner
    network_mode: none
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - suricata_logs:/var/log/suricata
    command: >
      sh -c "while true; do
        find /var/log/suricata -type f -name 'eve-*.json' -mtime +7 -exec rm -f '{}' ';';
        sleep 21600;
      done"
    depends_on:
      suricata:
        condition: service_started
    restart: unless-stopped

  # ============================================
  # Application Zone - remediated NestJS training API
  #
  # App and Suricata share the stable target namespace, so packets to port 3000
  # arrive on the eth0 interface the IDS monitors without host bridge sniffing.
  # ============================================
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: soc-lab-app
    network_mode: "service:target-netns"
    volumes:
      - app_logs:/var/log/app
    environment:
      - NODE_ENV=production
      - LOG_PATH=/var/log/app
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=soclab
      - DB_PASS=soclab_password
      - DB_NAME=soclab
    depends_on:
      db:
        condition: service_healthy
      suricata:
        condition: service_started
      target-netns:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # ============================================
  # Database - PostgreSQL (for SQLi scenarios)
  # ============================================
  db:
    image: postgres:15-alpine
    container_name: soc-lab-db
    hostname: db
    networks:
      app_net:
        ipv4_address: 172.23.0.40
    environment:
      - POSTGRES_USER=soclab
      - POSTGRES_PASSWORD=soclab_password
      - POSTGRES_DB=soclab
    ports:
      # Host-only publish keeps DB integration tests runnable without exposing
      # the lab database beyond the local machine.
      - "127.0.0.1:15432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./app/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soclab -d soclab"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ============================================
  # Defense - Fail2ban
  #
  # Fail2ban shares the stable target namespace, so iptables bans are applied
  # where the training API receives traffic even after an App/IDS rebuild.
  # ============================================
  fail2ban:
    image: crazymax/fail2ban@sha256:7cd8a427a44675397398a8dace2a3d755e62c72527f8730e4fd37697731a9321
    container_name: soc-lab-fail2ban
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: "service:target-netns"
    volumes:
      - ./fail2ban/jail.local:/etc/fail2ban/jail.local:ro
      - ./fail2ban/filter.d:/etc/fail2ban/filter.d:ro
      - ./fail2ban/action.d/slack-notify.conf:/etc/fail2ban/action.d/slack-notify.conf:ro
      - app_logs:/var/log/app:ro
      - fail2ban_logs:/var/log/fail2ban
      - fail2ban_data:/var/lib/fail2ban
    environment:
      # Application security logs are ISO-8601 UTC. Keeping Fail2ban in UTC
      # prevents valid events from being treated as nine-hour-old records.
      - TZ=UTC
      - F2B_LOG_LEVEL=INFO
      - F2B_LOG_TARGET=/var/log/fail2ban/fail2ban.log
    depends_on:
      app:
        condition: service_healthy
      target-netns:
        condition: service_started

  # ============================================
  # SIEM - Elasticsearch
  # ============================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: soc-lab-elasticsearch
    hostname: elasticsearch
    networks:
      - monitor_net
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - cluster.name=soc-lab
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "127.0.0.1:9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================
  # SIEM - Kibana
  # ============================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: soc-lab-kibana
    hostname: kibana
    networks:
      - monitor_net
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=soc-lab-kibana
      - XPACK_SECURITY_ENABLED=false
    ports:
      - "127.0.0.1:5601:5601"
    volumes:
      - ./elk/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    depends_on:
      elasticsearch:
        condition: service_healthy

  # ============================================
  # SIEM Bootstrap - templates, retention, and saved objects
  # ============================================
  siem-setup:
    image: curlimages/curl:8.10.1
    container_name: soc-lab-siem-setup
    networks:
      - monitor_net
    volumes:
      - ./elk:/bootstrap:ro
    entrypoint: ["sh", "/bootstrap/siem-bootstrap.sh"]
    environment:
      - ELASTICSEARCH_HOST=http://elasticsearch:9200
      - KIBANA_HOST=http://kibana:5601
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_started
    restart: "no"

  # ============================================
  # Log Collector - Filebeat
  # ============================================
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    container_name: soc-lab-filebeat
    hostname: filebeat
    user: root
    networks:
      - app_net
      - monitor_net
    volumes:
      - ./elk/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - suricata_logs:/var/log/suricata:ro
      - app_logs:/var/log/app:ro
      - fail2ban_logs:/var/log/fail2ban:ro
      - /var/log/audit:/var/log/audit:ro
      # Persist the registry so container recreation cannot duplicate-ingest
      # the entire Suricata history.
      - filebeat_data:/usr/share/filebeat/data
    command: filebeat -e -strict.perms=false
    depends_on:
      siem-setup:
        condition: service_completed_successfully

# ============================================
# Networks
# ============================================
networks:
  # Application network - Kali to Suricata/App and App to DB
  app_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.23.0.0/24

  # Monitor network - Filebeat to ELK
  monitor_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.24.0.0/24

# ============================================
# Volumes
# ============================================
volumes:
  suricata_logs:
  app_logs:
  attack_results:
  fail2ban_logs:
  fail2ban_data:
  filebeat_data:
  es_data:
  db_data:

