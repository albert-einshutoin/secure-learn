version: 2
updates:
  - package-ecosystem: npm
    directory: /app
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # Runtime types must follow the production LTS major. Major upgrades are
      # reviewed together with Docker and CI instead of as isolated type PRs.
      - dependency-name: "@types/node"
        update-types:
          - version-update:semver-major

  - package-ecosystem: docker
    directory: /app
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # Node Current is not a production upgrade target; stay on the supported
      # LTS major while still receiving patch and digest updates.
      - dependency-name: node
        update-types:
          - version-update:semver-major

  - package-ecosystem: docker
    directory: /attack
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /suricata
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /fail2ban
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /alerting/elastalert
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /learning/toolbox
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
