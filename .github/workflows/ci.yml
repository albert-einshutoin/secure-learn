name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: NestJS app build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Strict type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Database integration tests
        run: npm run test:integration
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_USER: postgres
          DB_NAME: postgres

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          languages: javascript-typescript

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Build analyzed source
        working-directory: app
        run: |
          npm ci
          npm run build

      - name: Analyze source
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4

  compose:
    name: Docker Compose validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Product and curriculum contract tests
        run: |
          node --test test/*.test.js
          scripts/curriculum_check.sh

      - name: Validate base compose
        run: docker compose config -q

      - name: Validate alerting compose
        run: docker compose -f docker-compose.yml -f docker-compose.alerting.yml config -q

      - name: Validate IPS compose
        run: docker compose -f docker-compose.yml -f docker-compose.ips.yml config -q

      - name: Validate exercise compose
        run: docker compose -f docker-compose.exercise.yml config -q

      - name: Validate learning Docker phases
        run: scripts/learning_phase_check.sh

      - name: Check shell script syntax
        run: find attack/scripts scripts elk -type f -name '*.sh' -print0 | xargs -0 bash -n

      - name: Kubernetes static checks
        run: scripts/k8s_static_check.sh

      - name: Build app Docker image
        run: docker build -t secure-learn-app-ci ./app

      - name: Check for local environment files
        run: |
          if git ls-files | grep -E '(^|/)\.env$|\.DS_Store$'; then
            echo "Local environment or OS metadata files must not be tracked."
            exit 1
          fi

  docs:
    name: Scenario guide validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Check generator syntax
        run: node --check scripts/generate_scenario_html.js

      - name: Regenerate scenario guides
        run: node scripts/generate_scenario_html.js

      - name: Check generated scenario guides
        run: scripts/scenario_html_check.sh

      - name: Check learning phase generator syntax
        run: node --check scripts/generate_learning_phase_html.js

      - name: Regenerate learning phase guides
        run: node scripts/generate_learning_phase_html.js

      - name: Regenerate curriculum runtime coverage
        run: node scripts/generate_curriculum_coverage.js

      - name: Ensure curriculum coverage is committed
        run: git diff --exit-code -- docs/curriculum/coverage.md

      - name: Check world-class curriculum coverage
        run: scripts/world_class_curriculum_check.sh

      - name: Ensure generated learning guides are committed
        run: git diff --exit-code -- docs/learning-phases

      - name: Ensure generated guides are committed
        run: git diff --exit-code -- docs/scenario-guides

  suricata:
    name: Suricata rule validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build Suricata image
        run: docker build -t secure-learn-suricata-ci ./suricata

      - name: Validate IDS rules
        run: docker run --rm secure-learn-suricata-ci -T -c /opt/soc-lab/suricata.yaml

      - name: Validate IPS rules
        run: docker run --rm secure-learn-suricata-ci -T -c /opt/soc-lab/suricata-ips.yaml

  fresh-stack:
    name: Fresh stack E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build and verify an empty-volume stack
        run: scripts/fresh_stack_e2e.sh

      - name: Upload runtime evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fresh-stack-evidence
          path: reports/fresh-stack
          if-no-files-found: error
          retention-days: 14

  container-security:
    name: Container security
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build, verify, Trivy scan, and generate SBOM evidence
        run: scripts/release_artifacts.sh

      - name: Upload security evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: container-security-evidence
          path: release
          if-no-files-found: error
          retention-days: 14
