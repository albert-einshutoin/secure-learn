# SOC-Lab Fail2ban Filter: Path Traversal Attempts
# Matches path traversal attempts from NestJS error.log

[Definition]

# Fail regex patterns for path traversal attempts
failregex = ^.*Path traversal attempt detected.*"source\.ip"\s*:\s*"<HOST>".*$
            ^.*"source\.ip"\s*:\s*"<HOST>".*Path traversal attempt.*$
            ^.*"source\.ip"\s*:\s*"<HOST>".*\.\..*$
            ^.*"source\.ip"\s*:\s*"<HOST>".*%%2e%%2e.*$

# Ignore regex
ignoreregex = 

# Date pattern for ECS timestamp
datepattern = "@timestamp"\s*:\s*"%%Y-%%m-%%dT%%H:%%M:%%S

[Init]
maxlines = 1

