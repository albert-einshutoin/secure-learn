# SOC-Lab Fail2ban Filter: SQL Injection Attempts
# Matches SQLi attempts from NestJS error.log

[Definition]

# Fail regex patterns for SQL injection attempts
failregex = ^.*"event\.action"\s*:\s*"sqli_attempt".*"source\.ip"\s*:\s*"<HOST>".*$
            ^.*"source\.ip"\s*:\s*"<HOST>".*"event\.action"\s*:\s*"sqli_attempt".*$
            ^.*SQLi attempt detected from <HOST>.*$
            ^.*"source\.ip"\s*:\s*"<HOST>".*UNION.*SELECT.*$
            ^.*"source\.ip"\s*:\s*"<HOST>".*OR\s+1\s*=\s*1.*$

# Ignore regex
ignoreregex = 

# Date pattern for ECS timestamp
datepattern = "@timestamp"\s*:\s*"%%Y-%%m-%%dT%%H:%%M:%%S

[Init]
maxlines = 1

