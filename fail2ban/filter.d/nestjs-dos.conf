# SOC-Lab Fail2ban Filter: DoS Detection
# Matches high-frequency access patterns from NestJS access.log

[Definition]

# Fail regex patterns for access log entries
# Each access log entry counts as one "failure" for rate limiting
failregex = ^.*"event\.module"\s*:\s*"nestjs".*"source\.ip"\s*:\s*"<HOST>".*$
            ^.*"source\.ip"\s*:\s*"<HOST>".*"event\.module"\s*:\s*"nestjs".*$

# Ignore regex (exclude health checks and static assets)
ignoreregex = ^.*"/health".*$
              ^.*"/favicon\.ico".*$

# Date pattern for ECS timestamp
datepattern = "@timestamp"\s*:\s*"%%Y-%%m-%%dT%%H:%%M:%%S

[Init]
maxlines = 1

