# SOC-Lab Fail2ban Filter: Authentication Failures
# Matches failed login attempts from NestJS auth.log

[Definition]

# Fail regex patterns for authentication failures
# Matches ECS-formatted JSON logs with login_failed action
failregex = ^.*"event\.action"\s*:\s*"login_failed".*"source\.ip"\s*:\s*"<HOST>".*$
            ^.*"source\.ip"\s*:\s*"<HOST>".*"event\.action"\s*:\s*"login_failed".*$
            ^.*Authentication login_failed from <HOST>.*$

# Ignore regex (successful logins)
ignoreregex = ^.*"event\.action"\s*:\s*"login_success".*$

# Date pattern for ECS timestamp
datepattern = "@timestamp"\s*:\s*"%%Y-%%m-%%dT%%H:%%M:%%S

[Init]
# Maximum number of lines to buffer
maxlines = 1

