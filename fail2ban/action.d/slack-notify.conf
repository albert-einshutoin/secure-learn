# SOC-Lab Fail2ban Action: Slack Notification
# Phase 2: Sends notifications to Slack when IPs are banned

[Definition]

# Action to execute when banning an IP
actionban = curl -s -X POST -H 'Content-type: application/json' \
            --data '{"text":"🚨 *Fail2ban Alert*\n*Action:* Ban\n*Jail:* <name>\n*IP:* <ip>\n*Time:* '"$(date '+%%Y-%%m-%%d %%H:%%M:%%S')"'\n*Failures:* <failures>"}' \
            <slack_webhook_url> || true

# Action to execute when unbanning an IP
actionunban = curl -s -X POST -H 'Content-type: application/json' \
              --data '{"text":"✅ *Fail2ban Alert*\n*Action:* Unban\n*Jail:* <name>\n*IP:* <ip>\n*Time:* '"$(date '+%%Y-%%m-%%d %%H:%%M:%%S')"'"}' \
              <slack_webhook_url> || true

# Action to start the jail
actionstart = curl -s -X POST -H 'Content-type: application/json' \
              --data '{"text":"🟢 *Fail2ban Alert*\n*Action:* Jail Started\n*Jail:* <name>"}' \
              <slack_webhook_url> || true

# Action to stop the jail
actionstop = curl -s -X POST -H 'Content-type: application/json' \
             --data '{"text":"🔴 *Fail2ban Alert*\n*Action:* Jail Stopped\n*Jail:* <name>"}' \
             <slack_webhook_url> || true

[Init]
# Slack webhook URL (set via environment variable or directly)
slack_webhook_url = ${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/YOUR/WEBHOOK/URL}

