# SOC-Lab Suricata IPS Configuration
# Phase 2: IPS Mode with NFQUEUE

%YAML 1.1
---

vars:
  address-groups:
    HOME_NET: "[172.22.0.0/24,172.23.0.0/24,172.24.0.0/24]"
    EXTERNAL_NET: "!$HOME_NET"
    HTTP_SERVERS: "$HOME_NET"
    SQL_SERVERS: "$HOME_NET"
    DNS_SERVERS: "$HOME_NET"

  port-groups:
    HTTP_PORTS: "80,3000,8080"
    SQL_PORTS: "5432,3306"

# Logging configuration
default-log-dir: /var/log/suricata/

stats:
  enabled: yes
  interval: 60

outputs:
  - eve-log:
      enabled: yes
      filetype: regular
      filename: eve-%Y-%m-%d.json
      rotate-interval: day
      pcap-file: false
      community-id: true
      types:
        - alert:
            payload: yes
            payload-buffer-size: 4kb
            payload-printable: yes
            packet: yes
            metadata: yes
            http-body: yes
            tagged-packets: yes
        - drop:
            alerts: yes
        - http:
            extended: yes
        - dns
        - tls:
            extended: yes
        - flow
        - stats:
            totals: yes

  - fast:
      enabled: yes
      filename: fast.log
      append: yes

  - stats:
      enabled: no
      filename: stats.log
      append: yes
      totals: yes

# Logging settings
logging:
  default-log-level: notice
  outputs:
    - console:
        enabled: yes
    - file:
        enabled: yes
        level: info
        filename: suricata.log

# Application layer parsers
app-layer:
  protocols:
    http:
      enabled: yes
      libhtp:
        default-config:
          personality: IDS
          request-body-limit: 100kb
          response-body-limit: 100kb
    tls:
      enabled: yes
    smtp:
      enabled: yes
    dns:
      tcp:
        enabled: yes
      udp:
        enabled: yes

# Detection engine settings
detect:
  profile: medium
  custom-values:
    toclient-groups: 3
    toserver-groups: 25
  sgh-mpm-context: auto
  inspection-recursion-limit: 3000

# Threading
threading:
  set-cpu-affinity: no
  detect-thread-ratio: 1.0

# Rule files
default-rule-path: /opt/soc-lab/rules
rule-files:
  - local.rules
  - drop.rules

# Stream settings
stream:
  memcap: 64mb
  checksum-validation: yes
  inline: yes
  reassembly:
    memcap: 256mb
    depth: 1mb
    toserver-chunk-size: 2560
    toclient-chunk-size: 2560

# NFQUEUE Mode Configuration
nfqueue:
  - mode: accept
    id: 0
    fail-open: yes
    # Queue settings
    max-pending-packets: 1024
    # Batch processing
    batchcount: 20

# Host settings
host:
  hash-size: 4096
  prealloc: 1000
  memcap: 32mb

# Flow settings
flow:
  memcap: 128mb
  hash-size: 65536
  prealloc: 10000
  emergency-recovery: 30

# Defrag settings
defrag:
  memcap: 32mb
  hash-size: 65536
  trackers: 65535
  max-frags: 65535
  prealloc: yes
  timeout: 60

# Flow timeout settings
flow-timeouts:
  default:
    new: 30
    established: 300
    closed: 0
    bypassed: 100
  tcp:
    new: 60
    established: 600
    closed: 60
    bypassed: 100
  udp:
    new: 30
    established: 120
    bypassed: 100
  icmp:
    new: 30
    established: 120
    bypassed: 100

