# SOC-Lab Filebeat Configuration
# Collects logs from all components and normalizes to ECS

# ============================================
# Input: Suricata EVE JSON
# ============================================
filebeat.inputs:
  - type: log
    enabled: true
    paths:
      - /var/log/suricata/eve-*.json
    # New installations start after the SIEM bootstrap. Beginning at EOF avoids
    # replaying stale multi-GB lab volumes while all user-generated events that
    # occur after startup are still collected.
    tail_files: true
    json.keys_under_root: true
    json.add_error_key: true
    json.overwrite_keys: true
    fields:
      event.module: suricata
      event.dataset: suricata.eve
    fields_under_root: true
    tags: ["suricata", "ids"]

  # ============================================
  # Input: NestJS Application Logs
  # ============================================
  - type: log
    enabled: true
    paths:
      - /var/log/app/auth.log
    tail_files: true
    json.keys_under_root: true
    json.add_error_key: true
    json.overwrite_keys: true
    fields:
      event.dataset: nestjs.auth
    fields_under_root: true
    tags: ["nestjs", "auth"]

  - type: log
    enabled: true
    paths:
      - /var/log/app/access.log
    tail_files: true
    json.keys_under_root: true
    json.add_error_key: true
    json.overwrite_keys: true
    fields:
      event.dataset: nestjs.access
    fields_under_root: true
    tags: ["nestjs", "access"]

  - type: log
    enabled: true
    paths:
      - /var/log/app/error.log
    tail_files: true
    json.keys_under_root: true
    json.add_error_key: true
    json.overwrite_keys: true
    fields:
      event.dataset: nestjs.error
    fields_under_root: true
    tags: ["nestjs", "error"]

  # ============================================
  # Input: Fail2ban Logs
  # ============================================
  - type: log
    enabled: true
    paths:
      - /var/log/fail2ban/fail2ban.log
    tail_files: true
    fields:
      event.module: fail2ban
      event.dataset: fail2ban.log
    fields_under_root: true
    tags: ["fail2ban"]

  # ============================================
  # Input: Auditd Logs (Host-based)
  # ============================================
  - type: log
    enabled: true
    paths:
      - /var/log/audit/audit.log
    tail_files: true
    fields:
      event.module: auditd
      event.dataset: auditd.log
    fields_under_root: true
    tags: ["auditd", "os"]

# ============================================
# Processors: ECS Normalization
# ============================================
processors:
  # Add ECS version
  - add_fields:
      target: ecs
      fields:
        version: "8.0.0"

  # Add host information
  - add_host_metadata:
      when.not.contains.tags: forwarded

  # Process Suricata logs
  - if:
      contains:
        tags: "suricata"
    then:
      - rename:
          fields:
            - from: "src_ip"
              to: "source.ip"
            - from: "src_port"
              to: "source.port"
            - from: "dest_ip"
              to: "destination.ip"
            - from: "dest_port"
              to: "destination.port"
            - from: "proto"
              to: "network.transport"
          ignore_missing: true
          fail_on_error: false
      - if:
          has_fields: ["alert"]
        then:
          - add_fields:
              target: ""
              fields:
                event.category: "intrusion_detection"
                event.type: "alert"
          - rename:
              fields:
                - from: "alert.signature"
                  to: "rule.name"
                - from: "alert.signature_id"
                  to: "rule.id"
                - from: "alert.category"
                  to: "rule.category"
                - from: "alert.severity"
                  to: "event.severity"
              ignore_missing: true
              fail_on_error: false

  # Process Fail2ban logs
  - if:
      contains:
        tags: "fail2ban"
    then:
      - dissect:
          tokenizer: "%{timestamp} %{+timestamp} fail2ban.%{component}%{?space}[%{pid}]: %{level} [%{jail}] %{action} %{source.ip}"
          field: "message"
          target_prefix: ""
          ignore_failure: true
      - add_fields:
          target: ""
          fields:
            event.category: "intrusion_detection"
      - script:
          lang: javascript
          source: |
            function process(event) {
              var action = event.Get("action");
              if (action) {
                action = action.toLowerCase().trim();
                if (action === "ban") {
                  event.Put("event.action", "ban");
                  event.Put("event.type", "denied");
                } else if (action === "unban") {
                  event.Put("event.action", "unban");
                  event.Put("event.type", "allowed");
                }
              }
              var jail = event.Get("jail");
              if (jail) {
                event.Put("rule.name", jail);
              }
              return event;
            }

  # Drop incomplete events
  - drop_fields:
      fields: ["agent.ephemeral_id", "agent.hostname", "log.offset"]
      ignore_missing: true

# ============================================
# Output: Elasticsearch
# ============================================
output.elasticsearch:
  hosts: ["elasticsearch:9200"]
  indices:
    - index: "soc-lab-suricata-%{+yyyy.MM.dd}"
      when.contains:
        tags: "suricata"
    - index: "soc-lab-nestjs-%{+yyyy.MM.dd}"
      when.contains:
        tags: "nestjs"
    - index: "soc-lab-fail2ban-%{+yyyy.MM.dd}"
      when.contains:
        tags: "fail2ban"
    - index: "soc-lab-auditd-%{+yyyy.MM.dd}"
      when.contains:
        tags: "auditd"

# ============================================
# Lifecycle ownership
# ============================================
# This pipeline writes explicit daily indices. Enabling Filebeat ILM would make
# Beats attempt to create a soc-lab data stream/rollover alias, which is
# incompatible with those index names. The bootstrap service installs the
# delete-only lifecycle policy and regular composable templates instead.
setup.ilm.enabled: false

# Filebeat 8 treats a Beat-managed template as a data-stream template and tries
# to create that stream during the output handshake. The bootstrap service owns
# regular composable templates, so disabling Beat template setup is required for
# the explicit daily indices above to receive events.
setup.template.enabled: false

# ============================================
# Kibana setup
# ============================================
setup.kibana:
  host: "kibana:5601"

# ============================================
# Logging
# ============================================
logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0640

