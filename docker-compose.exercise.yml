# SOC-Lab Docker Compose - Red vs Blue Exercise Mode
# Phase 3: Team-based security exercise environment

name: secure-learn-exercise

services:
  # ============================================
  # Red Team Zone
  # ============================================
  red_kali:
    build:
      context: ./attack
      dockerfile: Dockerfile
    container_name: soc-lab-red-kali
    hostname: red-kali
    tty: true
    stdin_open: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      red_team:
        ipv4_address: 172.30.0.10
      shared_target:
        ipv4_address: 172.32.0.10
    volumes:
      - ./attack/scripts:/scripts:ro
      - ./attack/wordlists:/wordlists:ro
      - red_results:/results
    command: /bin/bash
    environment:
      - TEAM=RED
      - TARGET_IP=172.32.0.100

  # ============================================
  # Blue Team Zone
  # ============================================
  blue_soc:
    image: docker.elastic.co/kibana/kibana:8.19.17@sha256:a0ab425c2ae1688c09fbe1956b0d55009960cbc55564b26a55c946a589f0276c
    container_name: soc-lab-blue-soc
    hostname: blue-soc
    networks:
      blue_team:
        ipv4_address: 172.31.0.10
      monitor_net:
        ipv4_address: 172.34.0.100
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=blue-soc
      - TEAM=BLUE
    ports:
      - "127.0.0.1:5602:5601"
    volumes:
      - ./elk/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    depends_on:
      - elasticsearch

  blue_terminal:
    image: alpine:3.22
    container_name: soc-lab-blue-terminal
    hostname: blue-terminal
    tty: true
    stdin_open: true
    networks:
      blue_team:
        ipv4_address: 172.31.0.20
      shared_target:
        ipv4_address: 172.32.0.20
    volumes:
      - ./scripts:/scripts:ro
      - blue_results:/results
    command: sh -c "apk add --no-cache curl jq && sh"
    environment:
      - TEAM=BLUE

  # ============================================
  # Shared Target Zone (DMZ)
  # ============================================
  target-netns:
    image: alpine:3.22
    container_name: soc-lab-exercise-target-netns
    hostname: target
    networks:
      shared_target:
        ipv4_address: 172.32.0.100
        aliases:
          - target-app
      app_net:
        ipv4_address: 172.33.0.100
    ports:
      - "127.0.0.1:3100:3000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command: ["tail", "-f", "/dev/null"]
    restart: unless-stopped

  target_app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: soc-lab-target-app
    # The stable namespace anchor keeps inspection and bans attached across
    # independent target application or Suricata rebuilds.
    network_mode: "service:target-netns"
    volumes:
      - target_logs:/var/log/app
    environment:
      - NODE_ENV=production
      - LOG_PATH=/var/log/app
      - DB_HOST=target_db
      - DB_PORT=5432
      - DB_USER=soclab
      - DB_PASS=soclab_password
      - DB_NAME=soclab
    depends_on:
      target_db:
        condition: service_healthy
      suricata:
        condition: service_started
      target-netns:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  target_db:
    image: postgres:15-alpine
    container_name: soc-lab-target-db
    hostname: target-db
    networks:
      - app_net
    environment:
      - POSTGRES_USER=soclab
      - POSTGRES_PASSWORD=soclab_password
      - POSTGRES_DB=soclab
    volumes:
      - target_db_data:/var/lib/postgresql/data
      - ./app/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soclab -d soclab"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ============================================
  # Security Infrastructure
  # ============================================
  suricata:
    build:
      context: ./suricata
      dockerfile: Dockerfile
    container_name: soc-lab-exercise-suricata
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    network_mode: "service:target-netns"
    volumes:
      - suricata_logs:/var/log/suricata
    command: -c /opt/soc-lab/suricata.yaml -i eth0
    depends_on:
      target-netns:
        condition: service_started

  suricata-log-pruner:
    image: alpine:3.22
    container_name: soc-lab-exercise-suricata-log-pruner
    network_mode: none
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - suricata_logs:/var/log/suricata
    command: >
      sh -c "while true; do
        find /var/log/suricata -type f -name 'eve-*.json' -mtime +7 -exec rm -f '{}' ';';
        sleep 21600;
      done"
    depends_on:
      suricata:
        condition: service_started
    restart: unless-stopped

  fail2ban:
    image: crazymax/fail2ban@sha256:7cd8a427a44675397398a8dace2a3d755e62c72527f8730e4fd37697731a9321
    container_name: soc-lab-exercise-fail2ban
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: "service:target-netns"
    volumes:
      - ./fail2ban/jail.local:/etc/fail2ban/jail.local:ro
      - ./fail2ban/filter.d:/etc/fail2ban/filter.d:ro
      - ./fail2ban/action.d/slack-notify.conf:/etc/fail2ban/action.d/slack-notify.conf:ro
      - target_logs:/var/log/app:ro
      - fail2ban_logs:/var/log/fail2ban
      - fail2ban_data:/var/lib/fail2ban
    environment:
      - TZ=UTC
      - F2B_LOG_LEVEL=INFO
      - F2B_LOG_TARGET=/var/log/fail2ban/fail2ban.log
    depends_on:
      target_app:
        condition: service_healthy
      target-netns:
        condition: service_started

  # ============================================
  # SIEM Infrastructure
  # ============================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.17@sha256:aa6ee0ea2d708cea22a24ed44a420c5bbde9853d58a872e1e870f2086d04f652
    container_name: soc-lab-exercise-es
    hostname: elasticsearch
    networks:
      - monitor_net
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - cluster.name=soc-lab-exercise
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "127.0.0.1:9201:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 30s
      timeout: 10s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:8.19.17@sha256:a0ab425c2ae1688c09fbe1956b0d55009960cbc55564b26a55c946a589f0276c
    container_name: soc-lab-exercise-kibana
    hostname: kibana
    networks:
      - monitor_net
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "127.0.0.1:5603:5601"
    volumes:
      - ./elk/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    depends_on:
      elasticsearch:
        condition: service_healthy

  siem-setup:
    image: curlimages/curl:8.10.1
    container_name: soc-lab-exercise-siem-setup
    networks:
      - monitor_net
    volumes:
      - ./elk:/bootstrap:ro
    entrypoint: ["sh", "/bootstrap/siem-bootstrap.sh"]
    environment:
      - ELASTICSEARCH_HOST=http://elasticsearch:9200
      - KIBANA_HOST=http://kibana:5601
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_started
    restart: "no"

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.19.17@sha256:b7645bf950ddb3132ecd17a184e4abe1aa2faf3809ba33ae769a8aa6ca936824
    container_name: soc-lab-exercise-filebeat
    hostname: filebeat
    user: root
    networks:
      - app_net
      - monitor_net
    volumes:
      - ./elk/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - suricata_logs:/var/log/suricata:ro
      - target_logs:/var/log/app:ro
      - fail2ban_logs:/var/log/fail2ban:ro
      - filebeat_data:/usr/share/filebeat/data
    command: filebeat -e --strict.perms=false
    depends_on:
      siem-setup:
        condition: service_completed_successfully

  # ============================================
  # Exercise Controller
  # ============================================
  exercise_controller:
    image: alpine:3.22
    container_name: soc-lab-exercise-controller
    hostname: controller
    networks:
      - red_team
      - blue_team
      - monitor_net
    volumes:
      - ./scripts:/scripts:ro
      - exercise_data:/data
    command: sh -c "apk add --no-cache curl jq bash && tail -f /dev/null"
    environment:
      - EXERCISE_START_TIME=""
      - EXERCISE_DURATION=3600

# ============================================
# Networks
# ============================================
networks:
  # Red Team network (isolated)
  red_team:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

  # Blue Team network (isolated)
  blue_team:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/24

  # Shared target network (DMZ)
  shared_target:
    driver: bridge
    ipam:
      config:
        - subnet: 172.32.0.0/24

  # Application network
  app_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.33.0.0/24

  # Monitoring network
  monitor_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.34.0.0/24

# ============================================
# Volumes
# ============================================
volumes:
  red_results:
  blue_results:
  target_logs:
  target_db_data:
  suricata_logs:
  fail2ban_data:
  fail2ban_logs:
  filebeat_data:
  es_data:
  exercise_data:

