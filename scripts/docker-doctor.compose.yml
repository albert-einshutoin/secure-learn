services:
  interface-probe:
    image: alpine:3.22@sha256:14358309a308569c32bdc37e2e0e9694be33a9d99e68afb0f5ff33cc1f695dce
    command:
      - sh
      - -ec
      - |
        test -d /sys/class/net/eth0
        test -d /sys/class/net/eth1
        test ! -e /sys/class/net/eth2
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      doctor_app:
        interface_name: eth0
      doctor_data:
        interface_name: eth1

networks:
  doctor_app:
    internal: true
  doctor_data:
    internal: true
