openapi: 3.0.3
info:
  title: Secure Learn Backend API
  version: 1.0.0
  description: Contract for the Secure Learn hands-on backend.
servers:
  - url: http://localhost:3000
paths:
  /:
    get:
      summary: Service identity
      responses:
        "200":
          description: Service identity response
  /health:
    get:
      summary: Liveness check
      responses:
        "200":
          description: App process is alive
  /health/ready:
    get:
      summary: Readiness check
      responses:
        "200":
          description: App dependencies are ready
        "503":
          description: One or more dependencies are unavailable
  /auth/login:
    post:
      summary: Authenticate a lab user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login succeeded
        "401":
          description: Login failed
        "429":
          description: Account temporarily locked
  /users:
    get:
      summary: Fetch a user by id
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: User found
        "400":
          description: Invalid id
        "404":
          description: User not found
  /users/search:
    get:
      summary: Search users by username
      parameters:
        - in: query
          name: name
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 64
      responses:
        "200":
          description: Search results
        "400":
          description: Invalid search term
  /users/admin/audit:
    get:
      summary: Admin-only audit proof endpoint
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin audit summary
        "401":
          description: Missing or invalid token
        "403":
          description: Insufficient role
  /files/{path}:
    get:
      summary: Read a published lab file
      parameters:
        - in: path
          name: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File content
        "400":
          description: Invalid path
        "403":
          description: Path traversal denied
        "404":
          description: File not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
