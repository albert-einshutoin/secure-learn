apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: secure-learn-default-deny
  labels:
    app.kubernetes.io/name: secure-learn
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: secure-learn-app-ingress
  labels:
    app.kubernetes.io/name: secure-learn
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: secure-learn
      app.kubernetes.io/component: app
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: secure-learn
              app.kubernetes.io/component: db
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: secure-learn-db-ingress
  labels:
    app.kubernetes.io/name: secure-learn
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: secure-learn
      app.kubernetes.io/component: db
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: secure-learn
              app.kubernetes.io/component: app
      ports:
        - protocol: TCP
          port: 5432
