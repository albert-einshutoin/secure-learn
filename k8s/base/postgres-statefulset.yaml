apiVersion: v1
kind: Service
metadata:
  name: secure-learn-db
  labels:
    app.kubernetes.io/name: secure-learn
    app.kubernetes.io/component: db
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: secure-learn
    app.kubernetes.io/component: db
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: secure-learn-db
  labels:
    app.kubernetes.io/name: secure-learn
    app.kubernetes.io/component: db
spec:
  serviceName: secure-learn-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: secure-learn
      app.kubernetes.io/component: db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: secure-learn
        app.kubernetes.io/component: db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: secure-learn-db
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secure-learn-db
                  key: credential
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: secure-learn-db
                  key: database
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: db-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
