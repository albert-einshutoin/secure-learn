apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-learn-app
  labels:
    app.kubernetes.io/name: secure-learn
    app.kubernetes.io/component: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: secure-learn
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: secure-learn
        app.kubernetes.io/component: app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: app
          image: ghcr.io/albert-einshutoin/secure-learn-app:REPLACE_WITH_GIT_SHA
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: LOG_PATH
              value: /var/log/app
            - name: DB_HOST
              value: secure-learn-db
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: secure-learn-db
                  key: username
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: secure-learn-db
                  key: credential
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: secure-learn-db
                  key: database
            - name: AUTH_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: secure-learn-app
                  key: token-signing-key
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 24
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/app
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: app-logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
