apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: secure-learn-app
  labels:
    app.kubernetes.io/name: secure-learn
    app.kubernetes.io/component: app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: secure-learn-app
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
